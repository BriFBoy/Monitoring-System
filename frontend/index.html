<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/index.css" />
    <link rel="stylesheet" href="/global/default.css" />
    <script src="/global/default.js"></script>
    <title></title>
  </head>
  <body>
    <nav class="sidenav">
      <div class="titleLayout">
        <a href="/">
          <h2>Monitoring</h2>
        </a>
      </div>
      <div id="options">
        <a href="/create">+</a>
      </div>
      <div class="iplist" id="iplist"></div>
    </nav>

    <div id="monitor">
      <div class="box">
        <h1 id="hostname"></h1>
        <p>Linux Distro: <span id="distro">--</span></p>
        <p>CPU: <span id="cpu-stat">--</span>%</p>
        <p>Mem: <span id="mem-stat">--</span> GB</p>
        <p>Disk: <span id="disk-stat">--</span> GB free</p>
      </div>
      <div class="cpu">
        <canvas id="cpu"></canvas>
      </div>
      <div class="mem">
        <canvas id="mem"></canvas>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
    <script type="module" src="/mem.js"></script>
    <script type="module" src="/cpu.js"></script>
    <script type="module" src="/system.js"></script>
    <script type="module" src="/global/nav.js"></script>
  </body>
</html>
